on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '*.md'
  workflow_dispatch:

name: Github Page

env:
  isExtPR: ${{ github.event.pull_request.head.repo.fork == true }}
  RUST_BACKTRACE: 1

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Use pre-built GHCR image with all R/Python/Julia/Quarto dependencies.
    # The image is built by the "Build CI Environment Image" workflow.
    container:
      image: ghcr.io/openbiox/bizard-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 120
    concurrency:
      group: quarto-publish-${{ github.event_name != 'pull_request' || github.run_id }}
      cancel-in-progress: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TMP_DIR: /tmp/bizard-render
    permissions:
      contents: write
      pages: write
      id-token: write
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ── Differential dependency updates ──────────────────────
      # These are fast no-ops when the image already has everything.
      - name: Install any new R dependencies
        run: Rscript -e 'pak::local_install_deps(dependencies = TRUE)'

      - name: Install any new Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install any new Julia dependencies
        run: |
          julia --project=Julia -e '
            using Pkg
            Pkg.resolve()
            Pkg.instantiate()
          '

      # ── Dependency Scanning ──────────────────────────────────
      - name: Scan and update dependencies
        run: |
          Rscript update-dependencies.R
          python3 manage-dependencies.py --update

      - name: Commit updated dependency files
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add DESCRIPTION requirements.txt Julia/Project.toml
          git commit -m 'chore: update dependencies' || echo "No changes to commit"
          git push origin || echo "No changes to commit"

      # ── Freeze Cache ─────────────────────────────────────────
      - name: Cache freeze directory
        uses: actions/cache@v4
        with:
          path: _freeze
          key: freeze-${{ runner.os }}-${{ hashFiles('**/*.qmd') }}
          restore-keys: |
            freeze-${{ runner.os }}-

      # ── Render ───────────────────────────────────────────────
      - name: Create temporary directory
        run: mkdir -p ${{ env.TMP_DIR }}

      - name: Render website with Babelquarto
        env:
          TMPDIR: ${{ env.TMP_DIR }}
          TMP: ${{ env.TMP_DIR }}
          TEMP: ${{ env.TMP_DIR }}
          R_COMPILE_PKGS: 0
        run: Rscript -e 'babelquarto::render_website()'

      # ── Deploy ───────────────────────────────────────────────
      - name: Upload Quarto artifacts
        if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Commit updated _freeze
        if: github.event_name != 'pull_request'
        run: |
          if [ -d "_freeze" ] && [ -n "$(ls -A _freeze)" ]; then
            git add -A _freeze
            git commit -m 'chore: update frozen contents' || echo "No changes to commit"
            git push origin || echo "No changes to push"
          else
            echo "_freeze is empty or missing, skipping"
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          quarto publish gh-pages --no-render --no-browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup temporary directory
        if: always()
        run: |
          TMP_PATH="${{ env.TMP_DIR }}"
          if [ -n "$TMP_PATH" ] && [ -d "$TMP_PATH" ]; then
            rm -rf "$TMP_PATH"
            echo "Removed $TMP_PATH directory"
          else
            echo "Skipping cleanup (path: $TMP_PATH)"
          fi
